# Local production-like stack: web (gunicorn) + Celery worker + beat, on
# Postgres + Redis. Set a real SECRET_KEY before using anywhere non-local.
x-backend-env: &backend-env
  SECRET_KEY: ${SECRET_KEY:-dev-compose-secret-change-me-0123456789-0123456789-abcdef}
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  DB_ENGINE: django.db.backends.postgresql
  DB_NAME: flowbit
  DB_USER: flowbit
  DB_PASSWORD: flowbit
  DB_HOST: db
  DB_PORT: "5432"
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  # The compose web port is plain HTTP; don't force the HTTPS redirect locally.
  SECURE_SSL_REDIRECT: "False"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: flowbit
      POSTGRES_USER: flowbit
      POSTGRES_PASSWORD: flowbit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowbit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7

  web:
    build: ./backend
    environment: *backend-env
    command: sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ./backend
    environment: *backend-env
    command: celery -A config worker -l info
    depends_on:
      - db
      - redis

  beat:
    build: ./backend
    environment: *backend-env
    command: celery -A config beat -l info
    depends_on:
      - db
      - redis

volumes:
  pgdata:
