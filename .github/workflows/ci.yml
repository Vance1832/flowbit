name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: System check
        env:
          SECRET_KEY: ci-test-secret-key-0123456789-0123456789-0123456789-abcdef
          DEBUG: "False"
        run: python manage.py check

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-0123456789-0123456789-0123456789-abcdef
          DEBUG: "False"
          # Use SQLite for CI (no external database service needed).
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"
          # Test client uses HTTP; don't force the production HTTPS redirect.
          SECURE_SSL_REDIRECT: "False"
        run: python manage.py test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build
